<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Burn It | Índice de Massa Corporal</title>
	</head>
	<body>
		<h1>Índice de Massa Corporal (IMC)</h1>
		<form>
			<label for="peso">Peso (kg):</label>
			<input
				type="number"
				id="peso"
				name="peso"
				min="20"
				step="0.1"
				max="400"
				required
			/>

			<label for="altura">Altura (cm):</label>
			<input
				type="number"
				id="altura"
				name="altura"
				min="50"
				step="1"
				max="260"
				required
			/>

			<button type="submit">Calcular IMC</button>
		</form>

		<div id="resultado"></div>
	</body>
	<script>
		document.querySelector("form").addEventListener("submit", function (e) {
			e.preventDefault();
			const peso = parseFloat(document.getElementById("peso").value);
			const altura = parseFloat(document.getElementById("altura").value) / 100; // Converter para metros

			const imc = peso / (altura * altura);
			let classificacao;

			if (imc < 18.5) {
				classificacao = "Abaixo do peso";
			} else if (imc < 25) {
				classificacao = "Peso normal";
			} else if (imc < 30) {
				classificacao = "Sobrepeso";
			} else {
				classificacao = "Obesidade";
			}

			document.getElementById("resultado").innerHTML =
				`<p>Seu IMC é: ${imc.toFixed(2)}</p><p>Classificação: ${classificacao}</p>`;
		});
	</script>
</html>

	<head>

		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="Calcule seu IMC e porcentagem de gordura corporal gratuitamente no Bunnit. Ferramentas rápidas e científicas para te ajudar no emagrecimento."
		/>
		<meta property="og:title" content="Índice de Massa Corporal | Bunnit" />
		<meta
			property="og:description"
			content="Ferramentas gratuitas para calcular suas métricas de saúde e fitness."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:url" content="#" />

		<meta property="og:image" content="#" />
		<!--TODO: Replace with site logo image URL -->

		<title>Índice de Massa Corporal | Bunnit</title>

		<link rel="canonical" href="#" />
		<!--TODO: Replace with your actual URL -->
		<link rel="stylesheet" href="../styles/css/imc.css" />
	</head>
	<body>
		<!-- * ======================================== -->
		<!-- * HEADER -->
		<!-- * ======================================== -->
		<header class="header">
			<a href="../index.html" class="header__link">
				<span class="header__title">Bunnit</span>
			</a>
			<nav>
				<ul class="header__nav">
					<li class="header__item">
						<a class="header__link" href="../index.html">Início</a>
					</li>
					<li class="header__item">
						<a
							class="header__link header__link--active"
							aria-current="page"
							href="../index.html#how-it-works"
							>Sobre</a
						>
					</li>
					<li class="header__item">
						<a class="header__link" href="#contact">Contato</a>
					</li>
				</ul>
			</nav>
		</header>

		<!-- * ======================================== -->
		<!-- * MAIN -->
		<!-- * ======================================== -->
		<main class="content-wrapper">
			<section class="content-intro">
				<img
					src="../assets/images/imc-banner-scale.jpg"
					alt="Imagem ilustrativa de uma pessoa subindo em uma balança de peso"
					class="content-intro__image"
				/>
				<h1 class="content-intro__title">Índice de Massa Corporal (IMC)</h1>
				<p class="content-intro__text">
					O cálculo do índice de massa corporal (IMC) é uma ferramenta simples e
					rápida para avaliar se uma pessoa está com o peso ideal em relação à
					sua altura.
				</p>
			</section>

			<section class="calculator">
				<form id="imc-form" class="calculator__form">
					<label for="peso" class="calculator__label">Peso (kg):</label>
					<input
						type="number"
						id="peso"
						class="calculator__number-input"
						name="peso"
						min="20"
						step="0.1"
						max="400"
						required
					/>

					<label for="altura" class="calculator__label">Altura (cm):</label>
					<input
						type="number"
						id="altura"
						class="calculator__number-input"
						name="altura"
						min="50"
						step="1"
						max="260"
						required
					/>

					<button type="submit" class="calculator__submit">Calcular IMC</button>
				</form>
			</section>

			<div id="resultado" class="calculator__result"></div>
		</main>
		<script type="module">
			import { initIMCController } from "../scripts/imcController.js";
			document.addEventListener("DOMContentLoaded", initIMCController);
		</script>
	</body>
</html>

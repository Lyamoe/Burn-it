<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Bunnit | Índice de Massa Corporal</title>

		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous"
		/>

		<link rel="stylesheet" href="../styles/css/reset.css" />
		<link rel="stylesheet" href="../styles/css/imc.css" />
	</head>
	<body>
		<!-- * ======================================== -->
		<!-- * HEADER -->
		<!-- * ======================================== -->
		<header class="header">
			<a href="index.html" class="header__link">
				<h1 class="header__title">Bunnit</h1>
			</a>
			<nav>
				<ul class="site-nav nav nav-underline">
					<li class="site-nav__item">
						<a
							class="site-nav__link site-nav__link--active nav-link active"
							aria-current="page"
							href="index.html"
							>Início</a
						>
					</li>
					<li class="site-nav__item">
						<a class="site-nav__link nav-link" href="#">Sobre</a>
					</li>
					<li class="site-nav__item">
						<a class="site-nav__link nav-link" href="#">Contato</a>
					</li>
				</ul>
			</nav>
		</header>

		<h1>Índice de Massa Corporal (IMC)</h1>

		<form novalidate>
			<label for="peso">Peso (kg):</label>
			<input
				type="number"
				id="peso"
				name="peso"
				min="20"
				step="0.1"
				max="400"
				required
			/>

			<label for="altura">Altura (cm):</label>
			<input
				type="number"
				id="altura"
				name="altura"
				min="50"
				step="1"
				max="260"
				required
			/>

			<button type="submit">Calcular IMC</button>
		</form>

		<div id="resultado"></div>

		<script type="module">
			import { initIMCController } from "../scripts/imcController.js";
			document.addEventListener("DOMContentLoaded", initIMCController);
		</script>
	</body>
</html>
